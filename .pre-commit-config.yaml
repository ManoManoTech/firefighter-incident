---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

ci:
  skip: [mypy]  # mypy requires the project venv; runs in GitHub Actions CI instead

default_language_version:
  python: python3.12
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: trailing-whitespace
      - id: check-executables-have-shebangs
      - id: debug-statements
      - id: end-of-file-fixer
        exclude: '.+main\.min\.css$'
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: fix-byte-order-marker
  # Versions must be kept in sync with lockfile (managed by sync-pre-commit-lock PDM plugin)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.5'
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/rtts/djhtml
    rev: '3.0.10'
    hooks:
      - id: djhtml
      - id: djcss
      - id: djjs

  - repo: https://github.com/adamchainz/djade-pre-commit
    rev: "1.9.0"
    hooks:
      - id: djade
        args: [--target-version, "4.2"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: pdm run lint-mypy
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        require_serial: true
